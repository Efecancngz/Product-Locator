version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product-locator-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=product_locator
      - ENV=production
      - REPORT_SYSTEM_URL=http://report-system:8080
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - report-system
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: product-locator-frontend
    ports:
      # Map host 3000 to container 80 (nginx)
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    container_name: product-locator-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # ReportSystem — Java notification microservice (Telegram, Email, SMS, WhatsApp)
  # Source: https://github.com/Efecancngz/ReportSystem
  # For production, replace 'build' with 'image: ghcr.io/efecancngz/report-system:latest'
  report-system:
    build: https://github.com/Efecancngz/ReportSystem.git
    container_name: product-locator-report-system
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:

